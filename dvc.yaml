stages:
    ingest:
        cmd: python src/data_ingestion.py
        deps:
            - src/data_ingestion.py
            - data/raw/spam.csv
        outs:
            - data/raw.csv
    preprocess:
        cmd: python src/data_preprocessing.py
        deps:
            - src/data_preprocessing.py
            - data/raw.csv
        outs:
            - data/preprocessed.csv
            - models/vectorizer.pkl
    train:
        cmd: python src/model_training.py
        deps:
            - src/train.py
            - data/preprocessed.csv
        outs:
            - models/model.pkl
        